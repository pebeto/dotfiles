# T470-specific sway bits. Included by ~/.config/sway/config via the
# ~/.config/sway-host.conf symlink.

# Bar background (used inside the shared bar { ... } block)
set $bar_bg #323232

# Notification handler for kernel/EC-driven hardware keys (wifi, bluetooth,
# fnlock). Userspace actions are in the shared config.
set $indicators ~/.config/sway/indicators.sh

### Touchpad configuration
input "2:7:SynPS/2_Synaptics_TouchPad" {
    dwt enabled
    tap enabled
    natural_scroll enabled
    middle_emulation enabled
}

### TrackPoint configuration
input "2:10:TPPS/2_IBM_TrackPoint" {
    pointer_accel -0.5
    dwt enabled
}

### Hardware key bindings (ACPI handles the state change; script notifies)
bindsym XF86WLAN      exec $indicators wifi
bindsym XF86Bluetooth exec $indicators bluetooth

# FnLock state notifier — Fn+Esc toggles FnLock at the EC level and
# Wayland doesn't see the keypress, so this is a manual on-demand
# readout of the current state from sysfs.
bindsym $mod+Shift+f exec $indicators fnlock
