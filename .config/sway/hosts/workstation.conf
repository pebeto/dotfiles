# Workstation-specific sway bits. Included by ~/.config/sway/config
# via the ~/.config/sway-host.conf symlink.

# Bar background (used inside the shared bar { ... } block)
set $bar_bg #000000

# Output layout
output DP-2     position 1920 0 mode 2560x1440@165Hz
output HDMI-A-2 position 0    0 mode 1920x1080@75Hz
