# Workstation-specific sway bits. Included by ~/.config/sway/config
# via the ~/.config/sway-host.conf symlink.

# Bar background (used inside the shared bar { ... } block)
set $bar_bg #000000

# Output layout.
# Target the Samsung by its make/model/serial identifier, not the DP connector
# name: the connector renumbers across ports/reboots (it came up as DP-4, not
# DP-2), which drops the mode line and falls back to 60Hz + scale 1. scale 1.25
# gives a 3072x1728 logical workspace on the 4K panel.
output "Samsung Electric Company Odyssey G70D H1AK500000" position 1920 0 mode 3840x2160@144Hz scale 1.5
output HDMI-A-2 position 0    0 mode 1920x1080@75Hz

# Night-light plus a per-display gamma trim. The Samsung reads brighter than the
# ICC-corrected image Windows produces, so pull it down on the Sway side and
# leave the shared monitor OSD (and the T470) untouched. Tuned by eye:
# -b is brightness (day:night, kept equal), -g is gamma (<1 darker).
exec gammastep -l $geoloc -b 0.90:0.90
