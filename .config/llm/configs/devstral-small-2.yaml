# Devstral-Small-2-24B (Mistral) -- agentic coding specialist, via llama.cpp.
#
# Uses Mistral's JSON [TOOL_CALLS] tool format, which llama.cpp grammar-
# constrains -> robust tool calls (no Qwen XML/peg-native parser bugs). Dense
# 24B, head_dim=128 (FA + quantized KV work on any build), non-thinking, no MTP.
#

# Pre-downloaded to disk (mmap -> low host RAM, no load-time OOM on this 30GB
# box). Re-fetch: curl -fL -C - -o <this path> \
#   https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-UD-Q5_K_XL.gguf
model: /home/pebeto/.cache/llama.cpp/Devstral-Small-2-24B-Instruct-2512-UD-Q5_K_XL.gguf
alias: devstral-small-2
host: 0.0.0.0
port: 8000

n-gpu-layers: 99
ctx-size: 131072
flash-attn: on
cache-type-k: q8_0
cache-type-v: q8_0

# Single-user serving wins (free -- no extra VRAM, no quality cost):
#  parallel 1  -> dedicate the whole KV budget to one slot (full ctx per request,
#                 instead of auto-splitting it across phantom concurrent slots).
#  cache-reuse -> reuse cached KV across agent turns via KV-shifting, so tool-result
#                 loops re-process less of the prompt each step (responsiveness).
parallel: 1
cache-reuse: 256

jinja: true               # Mistral [TOOL_CALLS] JSON format via the embedded template

# Mistral recommends a low temperature for Devstral.
temp: 0.15
top-p: 0.95

# If opencode errors "conversation roles must alternate user and assistant ...",
# the Mistral template is too strict for opencode's message order -- swap in a
# corrected chat-template-file then (same fix pattern as Qwen).