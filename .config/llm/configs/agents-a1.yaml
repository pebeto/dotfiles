# Agents-A1 (InternScience) -- 35B MoE AGENTIC + scientific-research model, via vLLM.
# qwen3_5_moe arch (same family as Qwen3.6/Ornith: 40 layers, 2 KV heads, head_dim 256,
# 256 experts / 8 active ~= 3B active, multimodal, 262144 train ctx). Built for
# long-horizon search, engineering, scientific research, and tool calling -- a strong
# brain for the research/plan agents. apache-2.0. Report: arXiv 2606.30616.
#
# WHY vLLM (not llama.cpp): qwen3_5_moe thinking+tool-calling is broken on llama.cpp
# (tool calls leak into reasoning_content, #22684) -- the GGUF quants are fine for plain
# chat but NOT for agentic/tool use. vLLM parses reasoning + tools correctly.
#
# QUANT: protoLabsAI/Agents-A1-NVFP4 -- a COMMUNITY NVFP4 (~21.8GB, W4A4) that "matches
# or beats the official FP8" and is explicitly tuned for consumer Blackwell (sm120).
# Sanity-check its quality (no official InternScience NVFP4 exists -- only FP8 + GGUFs).
# NVFP4 auto-detects from the checkpoint (compressed-tensors); no --quantization needed.
#
# vLLM schema (see run.sh): image: = Docker image; env-NAME: = a -e NAME=val; every
# other key: value = a `vllm serve --key value` flag. run.sh adds --gpus all/--ipc=host,
# -p PORT:PORT, the HF cache mount, and HF_TOKEN.

engine: vllm
image: vllm/vllm-openai:v0.24.0   # stable; if --moe-backend/NVFP4-MoE isn't supported, try a newer/nightly tag

model: protoLabsAI/Agents-A1-NVFP4
served-model-name: agents-a1
host: 0.0.0.0
port: 8000

# --- Consumer Blackwell (sm120 / RTX 5090) requirements, from the quant's model card ---
# These flag/env names come from the card -- verify with `run.sh --print agents-a1` and
# the first launch; adjust if your vLLM version names them differently.
env-VLLM_USE_FLASHINFER_SAMPLER: 0   # sm120 sampler stability
moe-backend: marlin                  # MANDATORY on Blackwell sm120 (kernel compat); note: disables MTP
language-model-only: true            # NVFP4 is calibrated text-only; skips the vision tower.
                                     # If unrecognized, use instead: limit-mm-per-prompt: '{"image": 0, "video": 0}'

# KV is cheap (2 KV heads x head_dim 256 x 40 layers). 65536 fits comfortably with the
# ~21.8GB weights at 0.90 util (default KV). For more context, add `kv-cache-dtype: fp8`
# and raise toward 131072 -- but verify vLLM accepts fp8 KV for this arch/marlin first.
# Trust the startup "GPU KV cache size: N tokens" line for the true ceiling.
max-model-len: 65536
gpu-memory-utilization: 0.90
max-num-seqs: 4                      # single-user; low value also keeps the GDN/Mamba cache small

# Agentic: reasoning + tool calling (from the base Agents-A1 README).
reasoning-parser: qwen3
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# NOTE: sampling (temperature/top-p/top-k/min-p) is PER-REQUEST in vLLM -- set in
# opencode.json, not here. This qwen3.5 family is loop-prone, so opencode carries
# min_p + presence_penalty as anti-loop guards (same fix as the Qwen loop).
